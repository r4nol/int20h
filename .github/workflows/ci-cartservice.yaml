name: "CI — Cartservice"

on:
  push:
    branches: [main]
    paths:
      - "src/cartservice/**"
      - ".github/workflows/ci-cartservice.yaml"
  pull_request:
    branches: [main]
    paths:
      - "src/cartservice/**"
      - ".github/workflows/ci-cartservice.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cartservice

jobs:
  build-scan-push:
    name: "Build → Scan → Push"
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=main-,format=short,event=push
            type=ref,event=pr,suffix=-${{ github.sha }}
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=Online Boutique Cartservice
            org.opencontainers.image.description=Online Boutique cart microservice (Go + Redis)
            org.opencontainers.image.vendor=INT20H Hackathon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: src/cartservice
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      # Trivy security scan — reports CRITICAL/HIGH CVEs to GitHub Security tab
      # continue-on-error: pipeline continues even if unfixed vulns are found
      # ignore-unfixed=true: skip CVEs with no patch available (reduces noise)
      - name: Trivy Vulnerability Scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-cartservice.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      # Upload results to GitHub Security tab — only if the SARIF file was created
      # (Trivy may fail before writing output if the image is inaccessible)
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-cartservice.sarif') != ''
        with:
          sarif_file: trivy-cartservice.sarif
          category: trivy-cartservice

      - name: Build Summary
        if: always()
        run: |
          echo "## Cartservice CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ steps.trivy.outcome }} |" >> $GITHUB_STEP_SUMMARY

  deploy-staging:
    name: "Deploy → Staging"
    needs: build-scan-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/deploy.yaml
    with:
      service: cartservice
      image-tag: ${{ needs.build-scan-push.outputs.image-tag }}
      environment: staging
    secrets: inherit
    permissions:
      contents: write
      id-token: write
