apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-gateway
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-http01
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - int20h-grafana.example.com
      secretName: grafana-gateway-tls
  rules:
    - host: int20h-grafana.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-kube-prometheus-grafana
                port:
                  number: 80
