apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
- ../../base
- network-policy.yaml
- hpa/frontend-hpa.yaml
- hpa/cartservice-hpa.yaml
- pdb/frontend-pdb.yaml
- pdb/cartservice-pdb.yaml

# CI-managed image tags for promoted microservices
# KEY: `name` must match the FULL gcr.io path from base/kustomization.yaml images.newName
# Command used by CI:
#   kustomize edit set image \
#     gcr.io/google-samples/microservices-demo/frontend=ghcr.io/r4nol/frontend:main-sha
images:
- name: gcr.io/google-samples/microservices-demo/cartservice
  newName: gcr.io/google-samples/microservices-demo/cartservice
  newTag: v0.10.0
- name: gcr.io/google-samples/microservices-demo/currencyservice
  newName: ghcr.io/r4nol/currencyservice
  newTag: main-6e1bc64
- name: gcr.io/google-samples/microservices-demo/frontend
  newName: ghcr.io/r4nol/frontend
  newTag: main-a2e20dc

  # Production: frontend x2, cartservice x2, rest x1
  # NOTE: multi-doc patch file — NO target: here (each doc matches by metadata.name)
  # Full resource limits for production
  # NodePort for production frontend
  # Zero-downtime rolling update strategy
patches:
- path: patches/replicas.yaml
- path: patches/resources-frontend.yaml
  target:
    kind: Deployment
    name: frontend
- path: patches/frontend-service.yaml
  target:
    kind: Service
    name: frontend-external
- path: patches/rolling-update-frontend.yaml
  target:
    kind: Deployment
    name: frontend
- path: patches/rolling-update-frontend.yaml
  target:
    kind: Deployment
    name: cartservice
