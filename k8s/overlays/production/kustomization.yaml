apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
  - ../../base
  - network-policy.yaml
  - hpa/frontend-hpa.yaml
  - hpa/cartservice-hpa.yaml
  - pdb/frontend-pdb.yaml
  - pdb/cartservice-pdb.yaml

# CI-managed image tags for frontend + cartservice
# Initial state: uses upstream gcr.io images (ArgoCD can sync immediately)
# After first CI run: deploy.yaml updates newName→ghcr.io and newTag→main-<sha>
# Command used by CI: kustomize edit set image frontend=ghcr.io/r4nol/frontend:main-sha
images:
  - name: frontend
    newName: gcr.io/google-samples/microservices-demo/frontend
    newTag: "v0.10.2"
  - name: cartservice
    newName: gcr.io/google-samples/microservices-demo/cartservice
    newTag: "v0.10.2"

patches:
  # Production: frontend x2, cartservice x2, rest x1
  - path: patches/replicas.yaml
    target:
      kind: Deployment
  # Full resource limits for production
  - path: patches/resources-frontend.yaml
    target:
      kind: Deployment
      name: frontend
  # NodePort for production frontend
  - path: patches/frontend-service.yaml
    target:
      kind: Service
      name: frontend-external
  # Zero-downtime rolling update strategy
  - path: patches/rolling-update-frontend.yaml
    target:
      kind: Deployment
      name: frontend
  - path: patches/rolling-update-frontend.yaml
    target:
      kind: Deployment
      name: cartservice
  # Disable loadgenerator in production
  - path: patches/loadgenerator.yaml
    target:
      kind: Deployment
      name: loadgenerator
