apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
- ../../base
- network-policy.yaml

# CI-managed image tags for frontend + cartservice
# KEY: `name` must match the FULL image path set by base/kustomization.yaml (after newName transform).
# Kustomize overlays do NOT override by short name — they match on the full resolved image name.
# Command used by CI:
#   kustomize edit set image \
#     gcr.io/google-samples/microservices-demo/frontend=ghcr.io/r4nol/frontend:main-sha
images:
- name: gcr.io/google-samples/microservices-demo/cartservice
  newName: ghcr.io/r4nol/cartservice
  newTag: main-032b9cf
- name: gcr.io/google-samples/microservices-demo/frontend
  newName: ghcr.io/r4nol/frontend
  newTag: main-032b9cf

  # All deployments run as single replica in staging (cost saving)
  # Reduce resource requests for staging
  # Change frontend-external from LoadBalancer to NodePort for staging
  # Disable loadgenerator in staging (run manually for demos)
patches:
- path: patches/replicas.yaml
  target:
    kind: Deployment
- path: patches/resources-frontend.yaml
  target:
    kind: Deployment
    name: frontend
- path: patches/frontend-service.yaml
  target:
    kind: Service
    name: frontend-external
- path: patches/loadgenerator.yaml
  target:
    kind: Deployment
    name: loadgenerator
