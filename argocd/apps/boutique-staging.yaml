apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boutique-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave 0: deploys after monitoring (wave -1)
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: boutique-staging

  source:
    repoURL: https://github.com/r4nol/int20h
    targetRevision: HEAD
    path: k8s/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true  # Required for CRDs and field manager conflicts
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

