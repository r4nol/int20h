apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  # Finalizer ensures cascading deletion: when root-app is deleted,
  # all child apps are also deleted (prevents orphaned resources)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave -1: root app is processed before all child apps
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default

  source:
    repoURL: https://github.com/r4nol/int20h
    targetRevision: HEAD
    path: argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true      # Delete child apps removed from Git
      selfHeal: true   # Re-create manually deleted child apps
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true  # Delete orphaned resources AFTER new ones are healthy
